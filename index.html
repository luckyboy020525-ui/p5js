<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      padding: 42px 24px;
      font-family: Arial, sans-serif;
      color: #ffffff;
      background:
        radial-gradient(circle at 15% 10%, rgba(120, 95, 255, 0.45), transparent 30%),
        radial-gradient(circle at 85% 20%, rgba(255, 180, 70, 0.28), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(60, 180, 255, 0.25), transparent 35%),
        linear-gradient(180deg, #070b1f, #11193b, #1b2858);
    }

    header {
      text-align: center;
      margin-bottom: 34px;
    }

    h1 {
      font-size: 2.4rem;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #c9d5ff;
      font-size: 0.95rem;
    }

    #projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 26px;
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
    }

    .cell {
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
      transition: 0.25s ease;
    }

    .cell:hover {
      transform: translateY(-7px) scale(1.01);
      box-shadow: 0 24px 55px rgba(0, 0, 0, 0.5);
    }

    .title {
      padding: 14px 16px;
      text-align: center;
      font-weight: bold;
      background: linear-gradient(90deg, #6a5cff, #9d7bff, #ffb347);
      color: white;
      letter-spacing: 0.5px;
    }

    .desc {
      display: block;
      margin-top: 5px;
      font-size: 0.78rem;
      font-weight: normal;
      color: #eef1ff;
    }

    .frame-wrap {
      width: 100%;
      aspect-ratio: 3 / 2;
      overflow: hidden;
      position: relative;
      background: #000;
    }

    iframe {
      width: 600px;
      height: 400px;
      border: none;
      transform: scale(0.9);
      transform-origin: top left;
      background: white;
    }

    footer {
      text-align: center;
      margin-top: 34px;
      font-size: 0.85rem;
      color: #b9c4ff;
    }
  </style>
</head>

<body>

  <header>
    <h1>나의 p5.js 작품</h1>
    <p class="subtitle">
과제 1~4 작품을 GitHub Pages로 구성한 웹 포트폴리오입니다.
</p>
  </header>

  <main id="projects">

    <section class="cell">
      <div class="title">
        과제 1
       <span class="desc">정적 추상화 작품</span>
      </div>
      <div class="frame-wrap">
        <iframe src="sample1/index.html"></iframe>
      </div>
    </section>

    <section class="cell">
      <div class="title">
        과제 4
        <span class="desc">동적 추상화 작품</span>
      </div>
      <div class="frame-wrap">
        <iframe src="sample4/index.html"></iframe>
      </div>
    </section>

    <section class="cell">
      <div class="title">
        과제 2
        <span class="desc">캐리커처</span>
      </div>
      <div class="frame-wrap">
        <iframe src="sample2/index.html"></iframe>
      </div>
    </section>

    <section class="cell">
      <div class="title">
        과제 3
        <span class="desc">움직이는 캐리커쳐(마우스와 키보드 눌러야 움직입니다.)</span>
      </div>
      <div class="frame-wrap">
        <iframe src="sample3/index.html"></iframe>
      </div>
    </section>

  </main>

  <footer>
    HTML · CSS · JavaScript · p5.js
  </footer>

</body>
